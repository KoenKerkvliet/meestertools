<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta name="theme-color" content="#6C63FF">
    <link rel="canonical" href="https://meestertools.nl/seo/gedragspatroon">

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meestertools.nl/seo/gedragspatroon">
    <meta property="og:title" content="Meestertools - Gedragspatroon">
    <meta property="og:description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta property="og:image" content="https://meestertools.nl/favicon.svg">
    <meta property="og:locale" content="nl_NL">
    <meta property="og:site_name" content="Meestertools">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Meestertools - Gedragspatroon">
    <meta name="twitter:description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta name="twitter:image" content="https://meestertools.nl/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Meestertools - Gedragspatroon</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/instellingen.css">
    <link rel="stylesheet" href="../css/gedragspatroon.css">
</head>
<body>
    <header id="app-header-slot"></header>

    <main class="tool-page-content">
        <div class="tool-inline-header">
            <a href="../seo" class="back-link">&larr; Terug</a>
            <div class="tool-inline-title">
                <h1>Gedragspatroon</h1>
                <p>Houd gedrag bij per dagdeel en ontdek patronen over de week.</p>
            </div>
            <button class="tool-settings-btn" id="btnSettings" title="Instellingen">&#9881;&#65039;</button>
        </div>

        <!-- Sectie 1: Dagweergave -->
        <div class="tool-page-body">
            <div class="gp-container">
                <!-- Student selector (individual mode) -->
                <div class="gp-student-select" id="studentSelectWrapper" style="display:none;">
                    <select id="studentSelect">
                        <option value="">Selecteer leerling...</option>
                    </select>
                </div>

                <!-- Day navigation -->
                <div class="gp-day-nav">
                    <button class="gp-nav-btn" id="btnPrevDay" title="Vorige dag">&larr;</button>
                    <span class="gp-day-label" id="dayLabel">Donderdag 13 maart</span>
                    <button class="gp-nav-btn" id="btnNextDay" title="Volgende dag">&rarr;</button>
                </div>

                <!-- Legend -->
                <div class="gp-legend" id="gpLegend"></div>

                <!-- Day chart -->
                <div class="gp-day-chart" id="dayChart">
                    <!-- Y-axis labels -->
                    <div class="gp-y-axis">
                        <div class="gp-y-label" data-level="3">Goed</div>
                        <div class="gp-y-label" data-level="2">Matig</div>
                        <div class="gp-y-label" data-level="1">Niet goed</div>
                    </div>
                    <!-- Chart area with columns -->
                    <div class="gp-chart-area" id="chartArea">
                        <!-- Grid lines -->
                        <div class="gp-grid-lines">
                            <div class="gp-grid-line"></div>
                            <div class="gp-grid-line"></div>
                            <div class="gp-grid-line"></div>
                        </div>
                        <!-- Columns rendered by JS -->
                        <div class="gp-columns" id="chartColumns"></div>
                        <!-- SVG connection line -->
                        <svg class="gp-connection-line" id="connectionLine" preserveAspectRatio="none"></svg>
                    </div>
                </div>
                <!-- X-axis labels -->
                <div class="gp-x-axis" id="xAxisLabels"></div>

                <!-- Empty state for individual mode -->
                <div class="gp-empty-state" id="emptyState" style="display:none;">
                    <div class="empty-icon">&#128100;</div>
                    <p>Selecteer een leerling om het gedragspatroon te bekijken.</p>
                </div>
            </div>
        </div>

        <!-- Sectie 2: Weekoverzicht -->
        <div class="tool-page-body gp-week-section">
            <div class="gp-week-header">
                <div class="gp-week-nav">
                    <button class="gp-nav-btn gp-nav-btn-sm" id="btnPrevWeek" title="Vorige week">&larr;</button>
                    <h2 class="gp-week-title" id="weekLabel">Weekoverzicht</h2>
                    <button class="gp-nav-btn gp-nav-btn-sm" id="btnNextWeek" title="Volgende week">&rarr;</button>
                </div>
                <button class="gp-pdf-btn" id="btnDownloadPdf" title="Download als PDF">
                    &#128196; Download PDF
                </button>
            </div>
            <div class="gp-week-grid-wrapper">
                <table class="gp-week-grid" id="weekGrid">
                    <thead id="weekGridHead"></thead>
                    <tbody id="weekGridBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Note popup -->
    <div class="gp-note-popup" id="notePopup">
        <div class="gp-note-popup-header">
            <span class="gp-note-popup-title">Notitie</span>
            <button class="gp-note-popup-close" id="btnNoteClose">&times;</button>
        </div>
        <textarea class="gp-note-input" id="noteInput" placeholder="Schrijf hier een notitie..." rows="3"></textarea>
        <div class="gp-note-popup-actions">
            <button class="gp-note-delete-btn" id="btnNoteDelete" title="Notitie verwijderen">Verwijderen</button>
            <button class="gp-note-save-btn" id="btnNoteSave">Opslaan</button>
        </div>
    </div>

    <!-- Settings modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Instellingen</h2>
                <button class="modal-close" id="btnCloseSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="settingMode">Modus</label>
                    <select id="settingMode">
                        <option value="class">Hele klas</option>
                        <option value="individual">Individuele leerling</option>
                    </select>
                </div>
                <div class="form-group" id="groupSelectGroup" style="display:none;">
                    <label for="settingGroup">Groep</label>
                    <select id="settingGroup">
                        <option value="">Selecteer groep...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="settingDisplayType">Weergave</label>
                    <select id="settingDisplayType">
                        <option value="colors">Kleuren (groen / oranje / rood)</option>
                        <option value="smileys">Smileys</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Dagdelen</label>
                    <div class="gp-segments-list" id="segmentsList"></div>
                    <button class="gp-add-segment-btn" id="btnAddSegment">+ Dagdeel toevoegen</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="btnSaveSettings">Opslaan</button>
            </div>
        </div>
    </div>

    <footer id="app-footer-slot"></footer>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="/js/template.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/app.js"></script>
    <script src="/js/active-class.js"></script>
    <script src="../js/instellingen.js"></script>
    <script src="../js/gedragspatroon.js"></script>
</body>
</html>
