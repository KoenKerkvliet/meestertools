<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Klassendienst tool: wie heeft deze week dienst? Roteert automatisch door je klas op leerlingnummer en houdt rekening met de vakanties.">
    <meta name="theme-color" content="#6C63FF">
    <link rel="canonical" href="https://meestertools.nl/organisatie/klassendienst">

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meestertools.nl/organisatie/klassendienst">
    <meta property="og:title" content="Meestertools - Klassendienst">
    <meta property="og:description" content="Klassendienst tool: wie heeft deze week dienst? Roteert automatisch door je klas en houdt rekening met de vakanties.">
    <meta property="og:image" content="https://meestertools.nl/favicon.svg">
    <meta property="og:locale" content="nl_NL">
    <meta property="og:site_name" content="Meestertools">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Meestertools - Klassendienst">
    <meta name="twitter:description" content="Klassendienst tool: wie heeft deze week dienst? Roteert automatisch door je klas en houdt rekening met de vakanties.">
    <meta name="twitter:image" content="https://meestertools.nl/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Meestertools - Klassendienst</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/instellingen.css">
    <link rel="stylesheet" href="../css/klassendienst.css">
</head>
<body>
    <header id="app-header-slot"></header>

    <main class="tool-page-content">
        <div class="tool-inline-header">
            <a href="../organisatie" class="back-link">&larr; Terug</a>
            <div class="tool-inline-title">
                <h1>Klassendienst</h1>
                <p>Wie heeft deze week klassendienst? Roteert automatisch door je klas.</p>
            </div>
            <button class="tool-settings-btn" id="btnSettings" title="Instellingen">&#9881;&#65039;</button>
        </div>
        <div class="tool-page-body">
            <div class="kd-container" id="kdContainer">
                <!-- Content injected by JS -->
                <div class="kd-loading">Laden...</div>
            </div>
        </div>
    </main>

    <!-- Settings modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Instellingen klassendienst</h2>
                <button class="modal-close" id="btnCloseSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="kdPerWeek">Aantal kinderen per week</label>
                    <select id="kdPerWeek">
                        <option value="1">1 kind</option>
                        <option value="2">2 kinderen</option>
                        <option value="3">3 kinderen</option>
                        <option value="4">4 kinderen</option>
                    </select>
                </div>
                <div class="form-group">
                    <div class="kd-tasks-head">
                        <label>Taken van de klassendienst</label>
                        <button type="button" class="btn-add-small" id="kdAddTaskBtn">+ Taak</button>
                    </div>
                    <div class="kd-tasks-edit" id="kdTasksEdit"></div>
                </div>
                <p class="kd-settings-hint">
                    Tip: stel het schooljaar en de vakanties in via
                    <a href="#" id="kdOpenSchooljaar">Instellingen &rarr; Schooljaar</a>.
                    De klassendienst slaat de vakantieweken automatisch over.
                </p>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="btnSaveSettings">Opslaan</button>
            </div>
        </div>
    </div>

    <footer id="app-footer-slot"></footer>

    <script src="/js/template.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/app.js"></script>
    <script src="/js/active-class.js"></script>
    <script src="../js/instellingen.js"></script>
    <script src="../js/klassendienst.js"></script>
</body>
</html>
