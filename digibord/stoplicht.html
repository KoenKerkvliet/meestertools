<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta name="theme-color" content="#6C63FF">
    <link rel="canonical" href="https://meestertools.nl/digibord/stoplicht">

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meestertools.nl/digibord/stoplicht">
    <meta property="og:title" content="Meestertools - Stoplicht">
    <meta property="og:description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta property="og:image" content="https://meestertools.nl/favicon.svg">
    <meta property="og:locale" content="nl_NL">
    <meta property="og:site_name" content="Meestertools">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Meestertools - Stoplicht">
    <meta name="twitter:description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta name="twitter:image" content="https://meestertools.nl/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Meestertools - Stoplicht</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/instellingen.css">
    <link rel="stylesheet" href="../css/stoplicht.css">
</head>
<body>
    <header id="app-header-slot"></header>

    <main class="tool-page-content">
        <div class="tool-inline-header">
            <a href="../digibordtools" class="back-link">&larr; Terug</a>
            <div class="tool-inline-title">
                <h1>Stoplicht</h1>
                <p>Geef duidelijk aan wat de verwachting is met het klasstoplicht.</p>
            </div>
            <button class="tool-settings-btn" id="btnSettings" title="Instellingen">&#9881;&#65039;</button>
        </div>
        <div class="tool-page-body">
            <div class="stoplicht-container">
                <div class="stoplicht-housing">
                    <button class="stoplicht-lamp" id="lampRood" data-color="rood">
                        <span class="lamp-glow"></span>
                    </button>
                    <button class="stoplicht-lamp" id="lampOranje" data-color="oranje">
                        <span class="lamp-glow"></span>
                    </button>
                    <button class="stoplicht-lamp" id="lampGroen" data-color="groen">
                        <span class="lamp-glow"></span>
                    </button>
                </div>
                <div class="stoplicht-label" id="stoplichtLabel"></div>
            </div>
        </div>
    </main>

    <!-- Settings modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Instellingen</h2>
                <button class="modal-close" id="btnCloseSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>
                        <span class="settings-color-dot settings-dot-rood"></span>
                        Betekenis rood
                    </label>
                    <input type="text" id="labelRood" placeholder="Bijv. Niet praten">
                </div>
                <div class="form-group">
                    <label>
                        <span class="settings-color-dot settings-dot-oranje"></span>
                        Betekenis oranje
                    </label>
                    <input type="text" id="labelOranje" placeholder="Bijv. Fluisteren">
                </div>
                <div class="form-group">
                    <label>
                        <span class="settings-color-dot settings-dot-groen"></span>
                        Betekenis groen
                    </label>
                    <input type="text" id="labelGroen" placeholder="Bijv. Praten mag">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="btnSaveSettings">Opslaan</button>
            </div>
        </div>
    </div>

    <footer id="app-footer-slot"></footer>

    <script src="/js/template.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/instellingen.js"></script>
    <script src="../js/stoplicht.js"></script>
</body>
</html>
