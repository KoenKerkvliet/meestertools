<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Stel een nieuw wachtwoord in voor je Meestertools account.">
    <meta name="theme-color" content="#6C63FF">
    <link rel="canonical" href="https://meestertools.nl/wachtwoord-resetten">

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meestertools.nl/wachtwoord-resetten">
    <meta property="og:title" content="Meestertools - Nieuw wachtwoord instellen">
    <meta property="og:description" content="Stel een nieuw wachtwoord in voor je Meestertools account.">
    <meta property="og:image" content="https://meestertools.nl/favicon.svg">
    <meta property="og:locale" content="nl_NL">
    <meta property="og:site_name" content="Meestertools">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Meestertools - Nieuw wachtwoord instellen">
    <meta name="twitter:description" content="Stel een nieuw wachtwoord in voor je Meestertools account.">
    <meta name="twitter:image" content="https://meestertools.nl/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Meestertools - Nieuw wachtwoord instellen</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span class="logo-icon">&#127891;</span>
                <h1>Meestertools</h1>
                <p>Nieuw wachtwoord instellen</p>
            </div>

            <div id="resetError" class="form-error" style="display:none;"></div>
            <div id="resetSuccess" class="form-success" style="display:none;"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="newPassword">Nieuw wachtwoord</label>
                    <input type="password" id="newPassword" placeholder="Minimaal 6 tekens" minlength="6" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Bevestig wachtwoord</label>
                    <input type="password" id="confirmPassword" placeholder="Herhaal wachtwoord" minlength="6" required>
                </div>

                <button type="submit" class="btn-login" id="resetBtn">Wachtwoord opslaan</button>
            </form>

            <div class="login-footer">
                <a href="index">Terug naar inloggen</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
