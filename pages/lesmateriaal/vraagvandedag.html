<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meestertools - Vraag van de Dag</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/instellingen.css">
    <link rel="stylesheet" href="../../css/vraagvandedag.css">
</head>
<body>
    <header class="app-header">
        <a href="../../dashboard" class="header-logo">
            <span class="logo-icon">&#127891;</span>
            Meestertools
        </a>
        <div class="header-profile">
            <button class="profile-btn" id="profileBtn" title="Profiel">?</button>
            <div class="profile-dropdown" id="profileDropdown">
                <div class="dropdown-header">
                    <div class="name">Laden...</div>
                    <div class="email"></div>
                </div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#9881;&#65039; Instellingen</div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#128100; Mijn profiel</div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#10067; Help</div>
                <div class="dropdown-item logout">&#128682; Uitloggen</div>
            </div>
        </div>
    </header>

    <main class="tool-page-content">
        <div class="tool-inline-header">
            <a href="../lesmateriaal" class="back-link">&larr; Terug</a>
            <div class="tool-inline-title">
                <h1>Vraag van de Dag</h1>
                <p>Stel een vraag, kies een leerling en onthul het antwoord.</p>
            </div>
            <button class="tool-settings-btn" id="btnSettings" title="Instellingen">&#9881;&#65039;</button>
        </div>
        <div class="tool-page-body">
            <div class="vvdd-container" id="vraagContainer">
                <!-- Content injected by JS -->
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal" style="max-width:640px;">
            <div class="modal-header">
                <h2>Instellingen</h2>
                <button class="modal-close" id="btnCloseSettings">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Groep selectie -->
                <div class="form-group">
                    <label for="selectGroup">Groep (voor leerling kiezen)</label>
                    <select id="selectGroup">
                        <option value="">Laden...</option>
                    </select>
                </div>

                <hr style="border:none;border-top:1px solid #E8E8F0;margin:16px 0;">

                <!-- Vraag toevoegen -->
                <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">Vraag toevoegen</h3>
                <div class="vvdd-add-form">
                    <textarea class="search-input vvdd-textarea" id="newQuestion" placeholder="Vraag..." rows="3"></textarea>
                    <textarea class="search-input vvdd-textarea" id="newAnswer" placeholder="Antwoord..." rows="3"></textarea>
                    <div class="vvdd-add-form-row">
                        <input type="text" class="search-input" id="newTheme" list="themesList" placeholder="Thema (optioneel)">
                        <datalist id="themesList"></datalist>
                        <button class="btn-primary" id="addQuestionBtn">+ Toevoegen</button>
                    </div>
                </div>

                <!-- Vragenlijst -->
                <h3 style="font-size:15px;font-weight:700;margin:20px 0 12px;">Vragen</h3>
                <div class="vvdd-questions-list" id="questionsList">
                    <p style="color:var(--text-light);text-align:center;padding:20px 0;">Nog geen vragen toegevoegd.</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="btnSaveSettings">Opslaan</button>
            </div>
        </div>
    </div>

    <!-- Edit Question Modal -->
    <div class="modal-overlay" id="editQuestionModal">
        <div class="modal" style="max-width:480px;">
            <div class="modal-header">
                <h2>Vraag bewerken</h2>
                <button class="modal-close" id="closeEditQuestion">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editQuestionId">
                <div class="form-group">
                    <label for="editQuestionInput">Vraag</label>
                    <textarea id="editQuestionInput" placeholder="Vraag" rows="3" class="vvdd-textarea"></textarea>
                </div>
                <div class="form-group">
                    <label for="editAnswerInput">Antwoord</label>
                    <textarea id="editAnswerInput" placeholder="Antwoord" rows="3" class="vvdd-textarea"></textarea>
                </div>
                <div class="form-group">
                    <label for="editThemeInput">Thema</label>
                    <input type="text" id="editThemeInput" list="themesListEdit" placeholder="Thema (optioneel)">
                    <datalist id="themesListEdit"></datalist>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelEditQuestion">Annuleren</button>
                <button class="btn-primary" id="saveEditQuestion">Opslaan</button>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <div class="footer-inner">
            <span class="footer-left">&copy; <span id="footerYear"></span> Meestertools &middot; Design by <a href="https://designpixels.nl" target="_blank" rel="noopener">Design Pixels</a></span>
            <a href="../../changelog" class="version">v0.0.2</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/instellingen.js"></script>
    <script src="../../js/vraagvandedag.js"></script>
</body>
</html>
