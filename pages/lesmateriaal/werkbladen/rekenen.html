<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meestertools - Werkblad Rekenen</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <link rel="stylesheet" href="../../../css/instellingen.css">
    <link rel="stylesheet" href="../../../css/werkbladen.css">
</head>
<body>
    <header class="app-header">
        <a href="../../../dashboard" class="header-logo">
            <span class="logo-icon">&#127891;</span>
            Meestertools
        </a>
        <div class="header-profile">
            <button class="profile-btn" id="profileBtn" title="Profiel">?</button>
            <div class="profile-dropdown" id="profileDropdown">
                <div class="dropdown-header">
                    <div class="name">Laden...</div>
                    <div class="email"></div>
                </div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#9881;&#65039; Instellingen</div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#128100; Mijn profiel</div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#10067; Help</div>
                <div class="dropdown-item logout">&#128682; Uitloggen</div>
            </div>
        </div>
    </header>

    <main class="tool-page-content">
        <div class="tool-inline-header">
            <a href="../werkbladen" class="back-link">&larr; Terug</a>
            <div class="tool-inline-title">
                <h1>Werkblad Rekenen</h1>
                <p>Genereer rekenbladen met bewerkingen, staartdelingen en meer.</p>
            </div>
        </div>

        <div class="tool-page-body">
            <!-- Sectie 1: Werkblad header -->
            <div class="wb-section wb-section-compact">
                <div class="wb-row">
                    <div class="wb-field">
                        <label for="wbTitle">Titel werkblad</label>
                        <input type="text" id="wbTitle" class="wb-input" placeholder="Rekenen" value="Rekenen">
                    </div>
                    <div class="wb-field wb-field-check">
                        <label class="wb-checkbox-label">
                            <input type="checkbox" id="wbNameField"> Naamveld toevoegen
                        </label>
                    </div>
                </div>
            </div>

            <!-- Sectie 2: Type sommen -->
            <div class="wb-section">
                <h3 class="wb-section-title">Type sommen</h3>
                <div class="wb-type-cards">
                    <button class="wb-type-card active" data-type="bewerkingen">
                        <span class="wb-type-icon">&#10133;</span>
                        <span class="wb-type-label">Bewerkingen</span>
                    </button>
                    <button class="wb-type-card" data-type="staartdelingen">
                        <span class="wb-type-icon">&#10135;</span>
                        <span class="wb-type-label">Staartdelingen</span>
                    </button>
                    <button class="wb-type-card" data-type="cijferen">
                        <span class="wb-type-icon">&#128290;</span>
                        <span class="wb-type-label">Cijferen</span>
                    </button>
                    <button class="wb-type-card" data-type="verhoudingstabellen">
                        <span class="wb-type-icon">&#128200;</span>
                        <span class="wb-type-label">Verhoudingstabellen</span>
                    </button>
                </div>
            </div>

            <!-- Sectie 3: Instellingen bewerkingen -->
            <div class="wb-section" id="settingsBewerkingen">
                <h3 class="wb-section-title">Instellingen bewerkingen</h3>

                <div class="wb-field">
                    <label>Aantal sommen</label>
                    <div class="wb-stepper">
                        <button class="wb-stepper-btn" id="wbCountMinus" type="button">&minus;</button>
                        <input type="number" id="wbCount" class="wb-stepper-input" value="50" min="1" max="200">
                        <button class="wb-stepper-btn" id="wbCountPlus" type="button">+</button>
                    </div>
                </div>

                <div class="wb-field">
                    <label>Bewerkingen</label>
                    <div class="wb-toggles-wide">
                        <button class="wb-toggle-wide active" data-op="+" title="Optellen"><span class="wb-toggle-sym">+</span> Optellen</button>
                        <button class="wb-toggle-wide active" data-op="-" title="Aftrekken"><span class="wb-toggle-sym">&minus;</span> Aftrekken</button>
                        <button class="wb-toggle-wide active" data-op="*" title="Vermenigvuldigen"><span class="wb-toggle-sym">&times;</span> Vermenigvuldigen</button>
                        <button class="wb-toggle-wide active" data-op="/" title="Delen"><span class="wb-toggle-sym">&divide;</span> Delen</button>
                    </div>
                </div>

                <div class="wb-field">
                    <label>Type getallen</label>
                    <div class="wb-switch-group">
                        <button class="wb-switch-btn active" data-numtype="heel">Hele getallen</button>
                        <button class="wb-switch-btn" data-numtype="decimaal">Decimale getallen</button>
                    </div>
                    <input type="hidden" name="numberType" id="numberTypeHidden" value="heel">
                </div>

                <div class="wb-field" id="decimalOptions" style="display:none;">
                    <div class="wb-row">
                        <div class="wb-field">
                            <label>Aantal decimalen (linker getal)</label>
                            <div class="wb-toggle-row">
                                <button class="wb-toggle-num active" data-dec="1" data-target="wbDec1">1</button>
                                <button class="wb-toggle-num" data-dec="2" data-target="wbDec1">2</button>
                                <button class="wb-toggle-num" data-dec="3" data-target="wbDec1">3</button>
                            </div>
                            <input type="hidden" id="wbDec1" value="1">
                        </div>
                        <div class="wb-field">
                            <label>Aantal decimalen (rechter getal)</label>
                            <div class="wb-toggle-row">
                                <button class="wb-toggle-num active" data-dec="1" data-target="wbDec2">1</button>
                                <button class="wb-toggle-num" data-dec="2" data-target="wbDec2">2</button>
                                <button class="wb-toggle-num" data-dec="3" data-target="wbDec2">3</button>
                            </div>
                            <input type="hidden" id="wbDec2" value="1">
                        </div>
                    </div>
                </div>

                <div class="wb-field">
                    <label>Bereik van getallen</label>
                    <div class="wb-row">
                        <div class="wb-field">
                            <span class="wb-range-label">Eerste getal</span>
                            <div class="wb-range-row">
                                <input type="number" id="wbMin1" class="wb-input" value="1" placeholder="Min">
                                <input type="number" id="wbMax1" class="wb-input" value="100" placeholder="Max">
                            </div>
                        </div>
                        <div class="wb-field">
                            <span class="wb-range-label">Tweede getal</span>
                            <div class="wb-range-row">
                                <input type="number" id="wbMin2" class="wb-input" value="1" placeholder="Min">
                                <input type="number" id="wbMax2" class="wb-input" value="100" placeholder="Max">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="wb-field wb-field-check">
                    <label class="wb-checkbox-label">
                        <input type="checkbox" id="wbAnswerSheet" checked> Antwoordblad toevoegen
                    </label>
                </div>

                <div class="wb-actions">
                    <button class="btn-primary wb-generate-btn" id="btnGenerate">&#128065; Voorbeeld bekijken</button>
                </div>
            </div>

            <!-- Sectie 4: Preview + Download -->
            <div class="wb-section" id="previewSection" style="display:none;">
                <div class="wb-preview-header">
                    <h3 class="wb-section-title">Voorbeeld</h3>
                    <button class="btn-primary wb-download-btn" id="btnDownloadPdf">&#128229; Download PDF</button>
                </div>
                <div class="wb-preview" id="wbPreview"></div>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <div class="footer-inner">
            <span class="footer-left">&copy; <span id="footerYear"></span> Meestertools &middot; Design by <a href="https://designpixels.nl" target="_blank" rel="noopener">Design Pixels</a></span>
            <a href="../../../changelog" class="version">v0.0.2</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="../../../js/supabase-config.js"></script>
    <script src="../../../js/app.js"></script>
    <script src="../../../js/instellingen.js"></script>
    <script src="../../../js/werkbladen-rekenen.js"></script>
</body>
</html>
