<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meestertools - Woorden Flitsen</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/instellingen.css">
    <link rel="stylesheet" href="../../css/woordenflitsen.css">
</head>
<body>
    <header class="app-header">
        <a href="../../dashboard" class="header-logo">
            <span class="logo-icon">&#127891;</span>
            Meestertools
        </a>
        <div class="header-profile">
            <button class="profile-btn" id="profileBtn" title="Profiel">?</button>
            <div class="profile-dropdown" id="profileDropdown">
                <div class="dropdown-header">
                    <div class="name">Laden...</div>
                    <div class="email"></div>
                </div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#9881;&#65039; Instellingen</div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#128100; Mijn profiel</div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#10067; Help</div>
                <div class="dropdown-item logout">&#128682; Uitloggen</div>
            </div>
        </div>
    </header>

    <main class="tool-page-content">
        <div class="tool-inline-header">
            <a href="../lesmateriaal" class="back-link">&larr; Terug</a>
            <div class="tool-inline-title">
                <h1>Woorden Flitsen</h1>
                <p>Oefen flitswoorden per leesniveau.</p>
            </div>
        </div>
        <div class="tool-page-body">
            <div class="wf-container" id="wfContainer">
                <!-- Word display area -->
                <div class="wf-display" id="wfDisplay">
                    <span class="wf-word" id="wfWord">Kies een niveau en druk op start</span>
                </div>

                <!-- Controls -->
                <div class="wf-controls">
                    <!-- Level selector -->
                    <div class="wf-control-group">
                        <label class="wf-label">Leesniveau</label>
                        <div class="wf-level-selector" id="wfLevelSelector">
                            <button class="wf-level-btn" data-level="E3">E3</button>
                            <button class="wf-level-btn" data-level="M4">M4</button>
                            <button class="wf-level-btn" data-level="E4">E4</button>
                            <button class="wf-level-btn" data-level="M5">M5</button>
                            <button class="wf-level-btn" data-level="E5">E5</button>
                            <button class="wf-level-btn" data-level="M6">M6</button>
                            <button class="wf-level-btn" data-level="E6">E6</button>
                            <button class="wf-level-btn" data-level="M7">M7</button>
                            <button class="wf-level-btn" data-level="E7">E7</button>
                            <button class="wf-level-btn" data-level="Plus">Plus</button>
                        </div>
                    </div>

                    <!-- Speed selector -->
                    <div class="wf-control-group">
                        <label class="wf-label">Snelheid</label>
                        <div class="wf-speed-selector" id="wfSpeedSelector">
                            <button class="wf-star-btn" data-speed="1" title="Heel rustig">&#9733;</button>
                            <button class="wf-star-btn" data-speed="2" title="Rustig">&#9733;</button>
                            <button class="wf-star-btn active" data-speed="3" title="Normaal">&#9733;</button>
                            <button class="wf-star-btn" data-speed="4" title="Snel">&#9733;</button>
                            <button class="wf-star-btn" data-speed="5" title="Heel snel">&#9733;</button>
                        </div>
                    </div>

                    <!-- Difficulty button -->
                    <div class="wf-control-group">
                        <label class="wf-label">Moeilijkheid</label>
                        <button class="wf-difficulty-btn" id="btnDifficulty">Selecteer...</button>
                    </div>

                    <!-- Start/Pause button -->
                    <div class="wf-control-group wf-control-action">
                        <button class="wf-start-btn" id="btnStartPause">&#9654; Start</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Difficulty Modal (placeholder) -->
    <div class="modal-overlay" id="difficultyModal">
        <div class="modal" style="max-width:400px;">
            <div class="modal-header">
                <h2>Moeilijkheid</h2>
                <button class="modal-close" id="closeDifficultyModal">&times;</button>
            </div>
            <div class="modal-body">
                <p style="color:var(--text-medium);text-align:center;padding:20px 0;">
                    Leesmoeilijkheden worden binnenkort toegevoegd via Beheer.
                </p>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="closeDifficultyBtn">Sluiten</button>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <p>
            &copy; <span id="footerYear"></span> Meestertools &middot;
            Design by <a href="https://designpixels.nl" target="_blank" rel="noopener">Design Pixels</a>
            <span class="version">v0.0.2</span>
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/instellingen.js"></script>
    <script src="../../js/woordenflitsen.js"></script>
</body>
</html>
