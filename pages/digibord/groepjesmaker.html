<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meestertools - Groepjesmaker</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/instellingen.css">
    <link rel="stylesheet" href="../../css/groepjesmaker.css">
</head>
<body>
    <header class="app-header">
        <a href="../../dashboard.html" class="header-logo">
            <span class="logo-icon">&#127891;</span>
            Meestertools
        </a>
        <div class="header-profile">
            <button class="profile-btn" id="profileBtn" title="Profiel">?</button>
            <div class="profile-dropdown" id="profileDropdown">
                <div class="dropdown-header">
                    <div class="name">Laden...</div>
                    <div class="email"></div>
                </div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#9881;&#65039; Instellingen</div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#128100; Mijn profiel</div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#10067; Help</div>
                <div class="dropdown-item logout">&#128682; Uitloggen</div>
            </div>
        </div>
    </header>

    <main class="tool-page-content">
        <div class="tool-inline-header">
            <a href="../digibordtools.html" class="back-link">&larr; Terug</a>
            <div class="tool-inline-title">
                <h1>Groepjesmaker</h1>
                <p>Verdeel je klas snel en eerlijk in willekeurige groepjes.</p>
            </div>
            <button class="tool-settings-btn" id="btnSettings" title="Instellingen">&#9881;&#65039;</button>
        </div>
        <div class="tool-page-body">
            <div class="groepjesmaker-container" id="groepjesContainer">
                <!-- Content injected by JS -->
            </div>
        </div>
    </main>

    <!-- Settings modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Instellingen</h2>
                <button class="modal-close" id="btnCloseSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="selectGroup">Kies een groep</label>
                    <select id="selectGroup">
                        <option value="">Laden...</option>
                    </select>
                </div>
                <hr class="settings-divider">
                <div class="form-group">
                    <label>Verdelen op basis van</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="splitMethod" value="numGroups" checked>
                            Aantal groepjes
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="splitMethod" value="perGroup">
                            Leerlingen per groepje
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="splitCount" id="splitCountLabel">Aantal groepjes</label>
                    <select id="splitCount">
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="btnSaveSettings">Opslaan</button>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <p>
            &copy; <span id="footerYear"></span> Meestertools &middot;
            Design by <a href="https://designpixels.nl" target="_blank" rel="noopener">Design Pixels</a>
            <span class="version">v0.0.2</span>
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/instellingen.js"></script>
    <script src="../../js/groepjesmaker.js"></script>
</body>
</html>
