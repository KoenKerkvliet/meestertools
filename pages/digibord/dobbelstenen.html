<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta name="theme-color" content="#6C63FF">
    <link rel="canonical" href="https://meestertools.nl/pages/digibord/dobbelstenen">

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meestertools.nl/pages/digibord/dobbelstenen">
    <meta property="og:title" content="Meestertools - Dobbelstenen">
    <meta property="og:description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta property="og:image" content="https://meestertools.nl/favicon.svg">
    <meta property="og:locale" content="nl_NL">
    <meta property="og:site_name" content="Meestertools">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Meestertools - Dobbelstenen">
    <meta name="twitter:description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta name="twitter:image" content="https://meestertools.nl/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Meestertools - Dobbelstenen</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/instellingen.css">
    <link rel="stylesheet" href="../../css/dobbelstenen.css">
</head>
<body>
    <header id="app-header-slot"></header>

    <main class="tool-page-content">
        <div class="tool-inline-header">
            <a href="../digibordtools" class="back-link">&larr; Terug</a>
            <div class="tool-inline-title">
                <h1>Dobbelstenen</h1>
                <p>Gooi de dobbelstenen en laat het toeval beslissen!</p>
            </div>
            <button class="tool-settings-btn" id="btnSettings" title="Instellingen">&#9881;&#65039;</button>
        </div>
        <div class="tool-page-body">
            <div class="dobbelstenen-container">
                <div class="dice-grid" id="diceGrid"></div>
                <div class="dice-total" id="diceTotal"></div>
                <button class="tool-action-btn dice-roll-btn" id="btnRoll">&#127922; Gooi!</button>
            </div>
        </div>
    </main>

    <!-- Settings modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Instellingen</h2>
                <button class="modal-close" id="btnCloseSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="diceCount">Aantal dobbelstenen</label>
                    <select id="diceCount">
                        <option value="1">1 dobbelsteen</option>
                        <option value="2">2 dobbelstenen</option>
                        <option value="3">3 dobbelstenen</option>
                        <option value="4">4 dobbelstenen</option>
                        <option value="5">5 dobbelstenen</option>
                        <option value="6">6 dobbelstenen</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="btnSaveSettings">Opslaan</button>
            </div>
        </div>
    </div>

    <footer id="app-footer-slot"></footer>

    <script src="/js/template.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/instellingen.js"></script>
    <script src="../../js/dobbelstenen.js"></script>
</body>
</html>
