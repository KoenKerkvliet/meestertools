<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meestertools - Podium</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/instellingen.css">
    <link rel="stylesheet" href="../../css/podium.css">
</head>
<body>
    <header class="app-header">
        <a href="../../dashboard" class="header-logo">
            <span class="logo-icon">&#127891;</span>
            Meestertools
        </a>
        <div class="header-profile">
            <button class="profile-btn" id="profileBtn" title="Profiel">?</button>
            <div class="profile-dropdown" id="profileDropdown">
                <div class="dropdown-header">
                    <div class="name">Laden...</div>
                    <div class="email"></div>
                </div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#9881;&#65039; Instellingen</div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#128100; Mijn profiel</div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#10067; Help</div>
                <div class="dropdown-item logout">&#128682; Uitloggen</div>
            </div>
        </div>
    </header>

    <main class="tool-page-content">
        <div class="tool-inline-header">
            <a href="../digibordtools" class="back-link">&larr; Terug</a>
            <div class="tool-inline-title">
                <h1>Podium</h1>
                <p>Onthul de top 3 van je klas op een Olympisch podium.</p>
            </div>
            <button class="tool-settings-btn" id="btnSettings" title="Instellingen">&#9881;&#65039;</button>
        </div>
        <div class="tool-page-body">
            <div class="podium-container">
                <div class="podium-stage">
                    <!-- Place 2 (left, silver) -->
                    <div class="podium-place place-2">
                        <div class="podium-name" id="name2">???</div>
                        <div class="podium-block block-2">
                            <span class="podium-number">2</span>
                        </div>
                    </div>
                    <!-- Place 1 (center, gold) -->
                    <div class="podium-place place-1">
                        <div class="podium-name" id="name1">???</div>
                        <div class="podium-block block-1">
                            <span class="podium-number">1</span>
                        </div>
                    </div>
                    <!-- Place 3 (right, bronze) -->
                    <div class="podium-place place-3">
                        <div class="podium-name" id="name3">???</div>
                        <div class="podium-block block-3">
                            <span class="podium-number">3</span>
                        </div>
                    </div>
                </div>

                <div class="podium-action">
                    <button class="podium-reveal-btn" id="btnReveal">Onthul!</button>
                </div>

                <div class="podium-empty" id="emptyState" style="display:none;">
                    <div class="empty-icon">&#127942;</div>
                    <p>Stel via de instellingen de top 3 in om te beginnen.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Confetti canvas -->
    <canvas id="confettiCanvas"></canvas>

    <!-- Settings modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Instellingen</h2>
                <button class="modal-close" id="btnCloseSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="settingGroup">Groep</label>
                    <select id="settingGroup">
                        <option value="">Selecteer groep...</option>
                    </select>
                </div>
                <div class="form-group" id="studentFields" style="display:none;">
                    <label for="settingPlace3">&#129353; Plaats 3 (Brons)</label>
                    <select id="settingPlace3">
                        <option value="">Selecteer leerling...</option>
                    </select>
                </div>
                <div class="form-group" id="studentFields2" style="display:none;">
                    <label for="settingPlace2">&#129352; Plaats 2 (Zilver)</label>
                    <select id="settingPlace2">
                        <option value="">Selecteer leerling...</option>
                    </select>
                </div>
                <div class="form-group" id="studentFields1" style="display:none;">
                    <label for="settingPlace1">&#129351; Plaats 1 (Goud)</label>
                    <select id="settingPlace1">
                        <option value="">Selecteer leerling...</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="btnSaveSettings">Opslaan</button>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <div class="footer-inner">
            <span class="footer-left">&copy; <span id="footerYear"></span> Meestertools &middot; Design by <a href="https://designpixels.nl" target="_blank" rel="noopener">Design Pixels</a></span>
            <a href="../../changelog" class="version">v0.0.2</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/instellingen.js"></script>
    <script src="../../js/podium.js"></script>
</body>
</html>
