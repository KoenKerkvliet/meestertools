<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meestertools - Gedragspatroon</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/instellingen.css">
    <link rel="stylesheet" href="../../css/gedragspatroon.css">
</head>
<body>
    <header class="app-header">
        <a href="../../dashboard" class="header-logo">
            <span class="logo-icon">&#127891;</span>
            Meestertools
        </a>
        <div class="header-profile">
            <button class="profile-btn" id="profileBtn" title="Profiel">?</button>
            <div class="profile-dropdown" id="profileDropdown">
                <div class="dropdown-header">
                    <div class="name">Laden...</div>
                    <div class="email"></div>
                </div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#9881;&#65039; Instellingen</div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#128100; Mijn profiel</div>
                <div class="dropdown-item" onclick="window.location.href='#'">&#10067; Help</div>
                <div class="dropdown-item logout">&#128682; Uitloggen</div>
            </div>
        </div>
    </header>

    <main class="tool-page-content">
        <div class="tool-inline-header">
            <a href="../digibordtools" class="back-link">&larr; Terug</a>
            <div class="tool-inline-title">
                <h1>Gedragspatroon</h1>
                <p>Houd gedrag bij per dagdeel en ontdek patronen over de week.</p>
            </div>
            <button class="tool-settings-btn" id="btnSettings" title="Instellingen">&#9881;&#65039;</button>
        </div>

        <div class="tool-page-body">
            <div class="gp-container">
                <!-- Controls bar: week nav + student selector -->
                <div class="gp-controls">
                    <div class="gp-week-nav">
                        <button class="gp-nav-btn" id="btnPrevWeek" title="Vorige week">&larr;</button>
                        <span class="gp-week-label" id="weekLabel">Week 11</span>
                        <button class="gp-nav-btn" id="btnNextWeek" title="Volgende week">&rarr;</button>
                    </div>
                    <div class="gp-student-select" id="studentSelectWrapper" style="display:none;">
                        <select id="studentSelect">
                            <option value="">Selecteer leerling...</option>
                        </select>
                    </div>
                </div>

                <!-- Legend -->
                <div class="gp-legend" id="gpLegend"></div>

                <!-- Grid -->
                <div class="gp-grid-wrapper">
                    <table class="gp-grid" id="gpGrid">
                        <thead id="gpGridHead"></thead>
                        <tbody id="gpGridBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Settings modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Instellingen</h2>
                <button class="modal-close" id="btnCloseSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="settingMode">Modus</label>
                    <select id="settingMode">
                        <option value="class">Hele klas</option>
                        <option value="individual">Individuele leerling</option>
                    </select>
                </div>
                <div class="form-group" id="groupSelectGroup" style="display:none;">
                    <label for="settingGroup">Groep</label>
                    <select id="settingGroup">
                        <option value="">Selecteer groep...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="settingDisplayType">Weergave</label>
                    <select id="settingDisplayType">
                        <option value="colors">Kleuren (groen / oranje / rood)</option>
                        <option value="smileys">Smileys</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Dagdelen</label>
                    <div class="gp-segments-list" id="segmentsList"></div>
                    <button class="gp-add-segment-btn" id="btnAddSegment">+ Dagdeel toevoegen</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="btnSaveSettings">Opslaan</button>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <p>
            &copy; <span id="footerYear"></span> Meestertools &middot;
            Design by <a href="https://designpixels.nl" target="_blank" rel="noopener">Design Pixels</a>
            <span class="version">v0.0.2</span>
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/instellingen.js"></script>
    <script src="../../js/gedragspatroon.js"></script>
</body>
</html>
