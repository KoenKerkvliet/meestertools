<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Educatieve games voor in de klas - leerzaam en leuk.">
    <meta name="theme-color" content="#6C63FF">
    <link rel="canonical" href="https://meestertools.nl/pages/educatieve-games">

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meestertools.nl/pages/educatieve-games">
    <meta property="og:title" content="Meestertools - Educatieve Games">
    <meta property="og:description" content="Educatieve games voor in de klas - leerzaam en leuk.">
    <meta property="og:image" content="https://meestertools.nl/favicon.svg">
    <meta property="og:locale" content="nl_NL">
    <meta property="og:site_name" content="Meestertools">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Meestertools - Educatieve Games">
    <meta name="twitter:description" content="Educatieve games voor in de klas - leerzaam en leuk.">
    <meta name="twitter:image" content="https://meestertools.nl/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Meestertools - Educatieve Games</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/instellingen.css">
</head>
<body>
    <header class="app-header">
        <a href="../dashboard" class="header-logo">
            <span class="logo-icon">&#127891;</span>
            Meestertools
        </a>
        <div class="header-profile">
            <button class="profile-btn" id="profileBtn" title="Profiel">?</button>
            <div class="profile-dropdown" id="profileDropdown">
                <div class="dropdown-header">
                    <div class="name">Laden...</div>
                    <div class="email"></div>
                </div>
                <div class="dropdown-item" onclick="openInstellingen()">&#9881;&#65039; Instellingen</div>
                <div class="dropdown-item" onclick="openInstellingen('profiel')">&#128100; Mijn profiel</div>
                <div class="dropdown-item logout">&#128682; Uitloggen</div>
            </div>
        </div>
    </header>

    <main class="tool-page-content has-grid">
        <a href="../dashboard" class="back-link">&larr; Terug naar dashboard</a>
        <div class="tool-page-header">
            <span class="page-icon">&#127918;</span>
            <h1>Educatieve Games</h1>
            <p>Leerzame spelletjes die leren leuk maken voor je leerlingen.</p>
        </div>
        <div class="tools-grid">
            <a href="educatieve-games/24game" class="tool-card">
                <span class="card-icon">&#127922;</span>
                <h3>24 Game</h3>
                <p>Maak 24 met 4 getallen en 3 bewerkingen. Wie kan het snelst?</p>
            </a>
        </div>
    </main>

    <footer class="app-footer">
        <div class="footer-inner">
            <span class="footer-left">&copy; <span id="footerYear"></span> Meestertools &middot; Design by <a href="https://designpixels.nl" target="_blank" rel="noopener">Design Pixels</a></span>
            <a href="../changelog" class="version">v0.0.2</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/instellingen.js"></script>
</body>
</html>
