<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Maak gratis een Meestertools account aan en krijg toegang tot alle interactieve tools voor jouw klas.">
    <meta name="theme-color" content="#6C63FF">
    <link rel="canonical" href="https://meestertools.nl/registreer">

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meestertools.nl/registreer">
    <meta property="og:title" content="Meestertools - Registreren">
    <meta property="og:description" content="Maak gratis een Meestertools account aan en krijg toegang tot alle interactieve tools voor jouw klas.">
    <meta property="og:image" content="https://meestertools.nl/favicon.svg">
    <meta property="og:locale" content="nl_NL">
    <meta property="og:site_name" content="Meestertools">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Meestertools - Registreren">
    <meta name="twitter:description" content="Maak gratis een Meestertools account aan en krijg toegang tot alle interactieve tools voor jouw klas.">
    <meta name="twitter:image" content="https://meestertools.nl/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Meestertools - Registreren</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span class="logo-icon">&#127891;</span>
                <h1>Meestertools</h1>
                <p>Maak een account aan</p>
            </div>

            <div id="registerError" class="form-error" style="display:none;"></div>
            <div id="registerSuccess" class="form-success" style="display:none;"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName">Volledige naam</label>
                    <input type="text" id="fullName" placeholder="Bijv. Juf Bianca" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mailadres</label>
                    <input type="email" id="email" placeholder="juf@basisschool.nl" required>
                </div>

                <div class="form-group">
                    <label for="password">Wachtwoord</label>
                    <input type="password" id="password" placeholder="Minimaal 8 tekens" minlength="8" required>
                </div>

                <button type="submit" class="btn-login" id="registerBtn">Account aanmaken</button>
            </form>

            <div class="login-footer">
                Heb je al een account? <a href="index">Log hier in</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
