<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meestertools - Registreren</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span class="logo-icon">&#127891;</span>
                <h1>Meestertools</h1>
                <p>Maak een account aan</p>
            </div>

            <div id="registerError" class="form-error" style="display:none;"></div>
            <div id="registerSuccess" class="form-success" style="display:none;"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName">Volledige naam</label>
                    <input type="text" id="fullName" placeholder="Bijv. Juf Bianca" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mailadres</label>
                    <input type="email" id="email" placeholder="juf@basisschool.nl" required>
                </div>

                <div class="form-group">
                    <label for="password">Wachtwoord</label>
                    <input type="password" id="password" placeholder="Minimaal 6 tekens" minlength="6" required>
                </div>

                <button type="submit" class="btn-login" id="registerBtn">Account aanmaken</button>
            </form>

            <div class="login-footer">
                Heb je al een account? <a href="index.html">Log hier in</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
