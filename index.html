<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meestertools - Inloggen</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span class="logo-icon">&#127891;</span>
                <h1>Meestertools</h1>
                <p>Het digitale platform voor de basisschool</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">E-mailadres</label>
                    <input type="email" id="email" placeholder="juf@basisschool.nl" required>
                </div>

                <div class="form-group">
                    <label for="password">Wachtwoord</label>
                    <input type="password" id="password" placeholder="Voer je wachtwoord in" required>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox"> Onthoud mij
                    </label>
                    <a href="#">Wachtwoord vergeten?</a>
                </div>

                <button type="submit" class="btn-login">Inloggen</button>
            </form>

            <div class="login-footer">
                Nog geen account? <a href="#">Registreer hier</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
