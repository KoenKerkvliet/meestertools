<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta name="theme-color" content="#6C63FF">
    <link rel="canonical" href="https://meestertools.nl/groepsvorming/checkin">

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meestertools.nl/groepsvorming/checkin">
    <meta property="og:title" content="Meestertools - Check-in">
    <meta property="og:description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta property="og:image" content="https://meestertools.nl/favicon.svg">
    <meta property="og:locale" content="nl_NL">
    <meta property="og:site_name" content="Meestertools">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Meestertools - Check-in">
    <meta name="twitter:description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta name="twitter:image" content="https://meestertools.nl/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Meestertools - Check-in</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/instellingen.css">
    <link rel="stylesheet" href="../css/checkin.css">
</head>
<body>
    <header id="app-header-slot"></header>

    <main class="tool-page-content">
        <div class="tool-inline-header">
            <a href="../groepsvorming" class="back-link">&larr; Terug</a>
            <div class="tool-inline-title">
                <h1>Check-in</h1>
                <p>Laat leerlingen aangeven hoe ze zich voelen.</p>
            </div>
            <button class="tool-settings-btn" id="btnSettings" title="Instellingen">&#9881;&#65039;</button>
        </div>
        <div class="tool-page-body">
            <div class="checkin-container">
                <h2 class="checkin-title" id="checkinTitle">Hoe voel je je vandaag?</h2>

                <div class="checkin-chart-wrapper">
                    <svg class="checkin-pie" id="checkinPie" viewBox="0 0 300 300">
                        <circle cx="150" cy="150" r="140" fill="#F0F0F5" />
                    </svg>
                    <div class="checkin-total" id="checkinTotal">
                        <span class="total-number">0</span>
                        <span class="total-label">stemmen</span>
                    </div>
                </div>

                <div class="checkin-smileys" id="checkinSmileys"></div>

                <button class="checkin-reset-btn" id="btnReset">Opnieuw beginnen</button>
            </div>
        </div>

        <!-- Week overview (hidden by default, toggle in settings) -->
        <div class="tool-page-body checkin-week-section" id="weekSection" style="display:none;">
            <div class="checkin-week-header">
                <h2 class="checkin-week-title">Weekoverzicht</h2>
                <button class="checkin-pdf-btn" id="btnDownloadPdf" title="Download als PDF">
                    &#128196; Download PDF
                </button>
            </div>
            <div class="checkin-week-grid" id="weekGrid"></div>
        </div>
    </main>

    <!-- Pie tooltip -->
    <div class="checkin-tooltip" id="pieTooltip"></div>

    <!-- Settings modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Instellingen</h2>
                <button class="modal-close" id="btnCloseSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="settingTitle">Vraag / titel</label>
                    <input type="text" id="settingTitle" placeholder="Hoe voel je je vandaag?">
                </div>
                <div class="form-group">
                    <label for="settingSmileyCount">Aantal smileys</label>
                    <select id="settingSmileyCount">
                        <option value="3">3 smileys</option>
                        <option value="4">4 smileys</option>
                        <option value="5" selected>5 smileys</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="settingWeekView">
                        Weekoverzicht tonen
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="btnSaveSettings">Opslaan</button>
            </div>
        </div>
    </div>

    <footer id="app-footer-slot"></footer>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="/js/template.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/instellingen.js"></script>
    <script src="../js/checkin.js"></script>
</body>
</html>
