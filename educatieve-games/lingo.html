<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lingo voor in de klas: raad het woord van 5 of 6 letters. Groen is goed, oranje staat op de verkeerde plaats, grijs zit niet in het woord.">
    <meta name="theme-color" content="#6C63FF">
    <link rel="canonical" href="https://meestertools.nl/educatieve-games/lingo">

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meestertools.nl/educatieve-games/lingo">
    <meta property="og:title" content="Meestertools - Lingo">
    <meta property="og:description" content="Raad het woord van 5 of 6 letters met de bekende Lingo-kleuren.">
    <meta property="og:image" content="https://meestertools.nl/favicon.svg">
    <meta property="og:locale" content="nl_NL">
    <meta property="og:site_name" content="Meestertools">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Meestertools - Lingo">
    <meta name="twitter:description" content="Raad het woord van 5 of 6 letters.">
    <meta name="twitter:image" content="https://meestertools.nl/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Meestertools - Lingo</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/instellingen.css">
    <link rel="stylesheet" href="../css/lingo.css">
</head>
<body>
    <div class="mt-page-loader" id="mtPageLoader"><div class="mt-spinner"></div></div>

    <header id="app-header-slot"></header>

    <main class="tool-page-content">
        <div class="tool-inline-header">
            <a href="../educatieve-games" class="back-link">&larr; Terug</a>
            <div class="tool-inline-title">
                <h1>Lingo</h1>
                <p>Raad het woord. De eerste letter krijg je cadeau.</p>
            </div>
            <button class="tool-settings-btn" id="lingoBtnSettings" title="Instellingen">&#9881;&#65039;</button>
        </div>

        <div class="tool-page-body">
            <div class="lingo-wrap">
                <div class="lingo-topbar">
                    <span class="lingo-chip" id="lingoLenLabel">5 letters</span>
                    <button class="lingo-btn lingo-btn-primary" id="lingoNew">&#128260; Nieuw woord</button>
                </div>

                <div class="lingo-board" id="lingoBoard"></div>

                <p class="lingo-message" id="lingoMessage">&nbsp;</p>

                <div class="lingo-keyboard" id="lingoKeyboard"></div>
            </div>
        </div>
    </main>

    <footer id="app-footer-slot"></footer>

    <!-- Instellingen -->
    <div class="modal-overlay" id="lingoSettingsModal">
        <div class="modal lingo-settings-modal">
            <div class="modal-header">
                <h2>Instellingen Lingo</h2>
                <button class="modal-close" id="lingoSettingsClose">&times;</button>
            </div>
            <div class="modal-body">
                <label class="lingo-field-label">Aantal letters</label>
                <div class="lingo-seg" id="lingoLenSeg">
                    <button type="button" class="lingo-seg-btn is-active" data-len="5">5 letters</button>
                    <button type="button" class="lingo-seg-btn" data-len="6">6 letters</button>
                </div>

                <div class="lingo-legend">
                    <span class="lingo-legend-item"><span class="lingo-swatch lingo-correct"></span> Goed</span>
                    <span class="lingo-legend-item"><span class="lingo-swatch lingo-present"></span> Verkeerde plaats</span>
                    <span class="lingo-legend-item"><span class="lingo-swatch lingo-absent"></span> Niet in het woord</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="lingoSettingsDone">Klaar</button>
            </div>
        </div>
    </div>

    <script src="/js/template.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/instellingen.js"></script>
    <script src="../js/lingo.js"></script>
</body>
</html>
