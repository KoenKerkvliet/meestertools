<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Speel een escape room klassikaal: kinderen doen mee via een code, jij volgt de voortgang live op het bord.">
    <meta name="theme-color" content="#6C63FF">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Meestertools - Escape room met de klas</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/instellingen.css">
    <link rel="stylesheet" href="../../css/escaperooms.css">
</head>
<body>
    <header id="app-header-slot"></header>

    <main class="tool-page-content">
        <div class="tool-inline-header">
            <a href="../escaperooms" class="back-link">&larr; Terug</a>
            <div class="tool-inline-title">
                <h1 id="erPageTitle">Escape room met de klas</h1>
                <p>Kinderen doen mee via een code &mdash; jij volgt alles live op het bord.</p>
            </div>
            <div style="width:38px;"></div>
        </div>

        <div class="tool-page-body">
            <!-- Sessie-kop: status + knoppen -->
            <div class="er-host-bar" id="erHostBar" style="display:none;">
                <div class="er-host-room">
                    <span class="er-host-room-title" id="erHostRoomTitle"></span>
                    <span class="er-host-pill" id="erHostPill">Lobby</span>
                </div>
                <div class="er-host-actions">
                    <button class="er-btn" id="erHostStartBtn" disabled>&#9654;&#65039; Start het spel</button>
                    <button class="er-btn er-btn-secondary" id="erHostStopBtn" style="display:none;">&#9209;&#65039; Stop de sessie</button>
                    <button class="er-btn" id="erHostNewBtn" style="display:none;">&#128260; Nieuwe sessie</button>
                </div>
            </div>

            <!-- Join-blok: code + QR (lobby en tijdens het spel) -->
            <div class="er-host-join" id="erHostJoin" style="display:none;">
                <div class="er-host-join-text">
                    <div class="er-host-join-label">Ga naar</div>
                    <div class="er-host-join-url">meestertools.nl/meedoen</div>
                    <div class="er-host-join-label">en vul de code in</div>
                    <div class="er-host-code" id="erHostCode"></div>
                </div>
                <div class="er-host-qr" id="erHostQr"></div>
            </div>

            <!-- Timer (tijdens het spel) -->
            <div class="er-host-timer" id="erHostTimer" style="display:none;">
                <span class="er-host-timer-label">&#9201;&#65039; Tijd</span>
                <span class="er-host-timer-display" id="erHostTimerDisplay">--:--</span>
            </div>

            <!-- Teams: lobby-chips of voortgangsdashboard -->
            <div class="er-host-teams-head" id="erHostTeamsHead" style="display:none;">
                <h2>Teams <span class="er-host-teamcount" id="erHostTeamCount">0</span></h2>
                <p class="er-host-hint" id="erHostHint">Wachten op teams&hellip; Laat kinderen alleen of in groepjes meedoen via de code.</p>
            </div>
            <div class="er-host-teams" id="erHostTeams"></div>

            <div id="erHostError" class="form-error" style="display:none;"></div>
        </div>
    </main>

    <footer id="app-footer-slot"></footer>

    <script src="/js/template.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/app.js"></script>
    <script src="/js/active-class.js"></script>
    <script src="../../js/instellingen.js"></script>
    <script src="../../js/escaperoom-klassikaal.js"></script>
</body>
</html>
