<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta name="theme-color" content="#6C63FF">
    <link rel="canonical" href="https://meestertools.nl/lesmateriaal/werkbladen/spelling">

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meestertools.nl/lesmateriaal/werkbladen/spelling">
    <meta property="og:title" content="Meestertools - Werkblad Spelling">
    <meta property="og:description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta property="og:image" content="https://meestertools.nl/favicon.svg">
    <meta property="og:locale" content="nl_NL">
    <meta property="og:site_name" content="Meestertools">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Meestertools - Werkblad Spelling">
    <meta name="twitter:description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta name="twitter:image" content="https://meestertools.nl/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Meestertools - Werkblad Spelling</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/instellingen.css">
    <link rel="stylesheet" href="../../css/werkbladen.css">
</head>
<body>
    <header id="app-header-slot"></header>

    <main class="tool-page-content">
        <div class="tool-inline-header">
            <a href="../werkbladen" class="back-link">&larr; Terug</a>
            <div class="tool-inline-title">
                <h1>Werkblad Spelling</h1>
                <p>Genereer werkbladen voor werkwoordspelling en spelling.</p>
            </div>
        </div>

        <div class="tool-page-body">
            <!-- Sectie 1: Algemene instellingen -->
            <div class="wb-section">
                <h3 class="wb-section-title">Algemene instellingen</h3>

                <div class="wb-row">
                    <div class="wb-field">
                        <label for="wbSpTitle">Titel werkblad</label>
                        <input type="text" id="wbSpTitle" class="wb-input" placeholder="Spellingwerkblad" value="Spellingwerkblad">
                    </div>
                    <div class="wb-field wb-field-name">
                        <label>Naamveld toevoegen</label>
                        <div class="wb-switch-group wb-switch-small">
                            <button class="wb-switch-btn active" data-spnamefield="ja">Ja</button>
                            <button class="wb-switch-btn" data-spnamefield="nee">Nee</button>
                        </div>
                        <input type="hidden" id="wbSpNameField" value="ja">
                    </div>
                </div>

                <div class="wb-row wb-row-date">
                    <div class="wb-field wb-field-name">
                        <label>Datum toevoegen</label>
                        <div class="wb-switch-group wb-switch-small">
                            <button class="wb-switch-btn" data-spdatefield="ja">Ja</button>
                            <button class="wb-switch-btn active" data-spdatefield="nee">Nee</button>
                        </div>
                        <input type="hidden" id="wbSpDateField" value="nee">
                    </div>
                    <div class="wb-field" id="spDatePrefix" style="display:none;">
                        <label for="wbSpDatePrefix">Prefix (optioneel)</label>
                        <input type="text" id="wbSpDatePrefix" class="wb-input" placeholder="Bijv. Huiswerk voor">
                    </div>
                    <div class="wb-field wb-field-date" id="spDatePicker" style="display:none;">
                        <label for="wbSpDate">Datum</label>
                        <div class="wb-date-row">
                            <span class="wb-date-icon">&#128197;</span>
                            <input type="date" id="wbSpDate" class="wb-input">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sectie 2: Type werkblad -->
            <div class="wb-section">
                <h3 class="wb-section-title">Type werkblad</h3>

                <div class="wb-type-cards">
                    <button class="wb-type-card active" data-sptype="werkwoordspelling">
                        <span class="wb-type-label">Werkwoordspelling</span>
                    </button>
                    <button class="wb-type-card" data-sptype="spelling">
                        <span class="wb-type-label">Spelling</span>
                    </button>
                </div>
            </div>

            <!-- Sectie 3: Instellingen werkwoordspelling -->
            <div class="wb-section" id="settingsWerkwoordspelling">
                <h3 class="wb-section-title">Instellingen</h3>

                <div class="wb-row">
                    <div class="wb-field wb-field-name">
                        <label>Tijd tonen</label>
                        <div class="wb-switch-group wb-switch-small">
                            <button class="wb-switch-btn active" data-sptijd="ja">Ja</button>
                            <button class="wb-switch-btn" data-sptijd="nee">Nee</button>
                        </div>
                        <input type="hidden" id="wbSpTijdField" value="ja">
                    </div>
                </div>

                <div class="wb-row">
                    <div class="wb-field">
                        <label>Filter op tijd</label>
                        <div class="wb-switch-group wb-switch-small wb-switch-quad">
                            <button class="wb-switch-btn active" data-spfiltertijd="tt">Tegenw. tijd</button>
                            <button class="wb-switch-btn" data-spfiltertijd="vt">Verleden tijd</button>
                            <button class="wb-switch-btn" data-spfiltertijd="voltooide">Voltooide tijd</button>
                            <button class="wb-switch-btn" data-spfiltertijd="gemengd">Gemengd</button>
                        </div>
                        <input type="hidden" id="wbSpFilterTijd" value="tt">
                    </div>
                    <div class="wb-field">
                        <label>Werkwoorden</label>
                        <div class="wb-switch-group wb-switch-small wb-switch-triple">
                            <button class="wb-switch-btn active" data-spsterk="zwak">Zwak</button>
                            <button class="wb-switch-btn" data-spsterk="sterk">Sterk</button>
                            <button class="wb-switch-btn" data-spsterk="beide">Beide</button>
                        </div>
                        <input type="hidden" id="wbSpFilterSterk" value="zwak">
                    </div>
                </div>

                <div class="wb-row">
                    <div class="wb-field">
                        <label>Vormen</label>
                        <div class="wb-toggles-vormen">
                            <button class="wb-toggle-wide active" data-spvorm="ik">ik</button>
                            <button class="wb-toggle-wide" data-spvorm="jij">jij</button>
                            <button class="wb-toggle-wide" data-spvorm="hij">hij</button>
                            <button class="wb-toggle-wide" data-spvorm="wij">wij</button>
                        </div>
                        <div class="wb-toggles-vormen wb-toggles-vormen-1" style="margin-top:6px;">
                            <button class="wb-toggle-wide" data-spvorm="bvd">bijv. gebr. voltooid deelwoord</button>
                        </div>
                    </div>
                </div>

                <div class="wb-row">
                    <div class="wb-field wb-field-name">
                        <label>Antwoordblad</label>
                        <div class="wb-switch-group wb-switch-small">
                            <button class="wb-switch-btn active" data-spantwoord="ja">Ja</button>
                            <button class="wb-switch-btn" data-spantwoord="nee">Nee</button>
                        </div>
                        <input type="hidden" id="wbSpAnswerSheet" value="ja">
                    </div>
                </div>
            </div>

            <!-- Sectie 3: Instellingen spelling -->
            <div class="wb-section" id="settingsSpelling" style="display:none;">
                <h3 class="wb-section-title">Instellingen</h3>

                <div class="wb-coming-soon">
                    <div class="wb-coming-icon">&#128679;</div>
                    <p>De instellingen voor spelling worden binnenkort toegevoegd.</p>
                </div>
            </div>

            <!-- Gedeelde actie-knop -->
            <div class="wb-section" id="spGenerateSection">
                <div class="wb-actions">
                    <button class="btn-primary wb-generate-btn" id="btnSpGenerate">&#128065; Voorbeeld bekijken</button>
                </div>
            </div>

            <!-- Preview + Download -->
            <div class="wb-section" id="spPreviewSection" style="display:none;">
                <div class="wb-preview-header">
                    <h3 class="wb-section-title">Voorbeeld</h3>
                    <button class="btn-primary wb-download-btn" id="btnSpDownloadPdf">&#128229; Download PDF</button>
                </div>
                <div class="wb-preview" id="wbSpPreview"></div>
            </div>
        </div>
    </main>

    <footer id="app-footer-slot"></footer>

    <script src="/js/template.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/instellingen.js"></script>
    <script src="../../js/werkbladen-spelling.js"></script>
</body>
</html>
