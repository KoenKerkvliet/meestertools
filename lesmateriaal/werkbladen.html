<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta name="theme-color" content="#6C63FF">
    <link rel="canonical" href="https://meestertools.nl/lesmateriaal/werkbladen">

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meestertools.nl/lesmateriaal/werkbladen">
    <meta property="og:title" content="Meestertools - Werkbladen">
    <meta property="og:description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta property="og:image" content="https://meestertools.nl/favicon.svg">
    <meta property="og:locale" content="nl_NL">
    <meta property="og:site_name" content="Meestertools">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Meestertools - Werkbladen">
    <meta name="twitter:description" content="Een tool van Meestertools - het digitale platform voor de basisschool.">
    <meta name="twitter:image" content="https://meestertools.nl/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Meestertools - Werkbladen</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/instellingen.css">
</head>
<body>
    <header id="app-header-slot"></header>

    <main class="tool-page-content has-grid">
        <a href="../lesmateriaal" class="back-link">&larr; Terug naar Lesmateriaal</a>
        <div class="tool-page-header">
            <span class="page-icon">&#128196;</span>
            <h1>Werkbladen</h1>
            <p>Genereer werkbladen voor rekenen, taal en spelling.</p>
        </div>
        <div class="tools-grid">
            <a href="werkbladen/rekenen" class="tool-card">
                <span class="card-icon">&#128290;</span>
                <h3>Rekenen</h3>
                <p>Genereer rekenbladen met bewerkingen, staartdelingen, cijferen en meer.</p>
            </a>
            <div class="tool-card" style="opacity:0.5;pointer-events:none;cursor:default;">
                <span class="card-icon">&#128221;</span>
                <h3>Taal</h3>
                <p>Binnenkort beschikbaar.</p>
            </div>
            <a href="werkbladen/spelling" class="tool-card">
                <span class="card-icon">&#128214;</span>
                <h3>Spelling</h3>
                <p>Genereer werkbladen voor werkwoordspelling en spelling.</p>
            </a>
        </div>
    </main>

    <footer id="app-footer-slot"></footer>

    <script src="/js/template.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/instellingen.js"></script>
</body>
</html>
