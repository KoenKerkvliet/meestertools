<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Meestertools - Wachtwoord vergeten</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span class="logo-icon">&#127891;</span>
                <h1>Meestertools</h1>
                <p>Wachtwoord vergeten?</p>
            </div>

            <div id="forgotError" class="form-error" style="display:none;"></div>
            <div id="forgotSuccess" class="form-success" style="display:none;"></div>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">E-mailadres</label>
                    <input type="email" id="email" placeholder="juf@basisschool.nl" required>
                </div>

                <p style="font-size: 14px; color: #666; margin-bottom: 16px;">
                    We sturen je een e-mail met een link om je wachtwoord opnieuw in te stellen.
                </p>

                <button type="submit" class="btn-login" id="forgotBtn">Stuur reset-link</button>
            </form>

            <div class="login-footer">
                Toch onthouden? <a href="index">Terug naar inloggen</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
